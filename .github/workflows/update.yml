name: Daily Ops Trend Sync

# 触发条件：每天按时跑，或者允许我们手动点击运行
on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间午夜自动运行
  workflow_dispatch: # 开启手动点击运行的魔法按钮！

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest # 使用 GitHub 免费提供的 Linux 服务器
    permissions:
      contents: write # 允许机器人帮你提交最新的数据文件
      
    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v3
      
    - name: 2. Setup Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: 3. Run Fetch Script (执行你的大脑逻辑)
      run: python fetch_data.py
      
    - name: 4. Commit and Push Changes (把抓到的数据存回仓库)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update global trends data" && git push)
